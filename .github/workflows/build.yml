name: Build and Release

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
        - os: windows-latest
          rid: win-x64
        - os: windows-latest
          rid: win-arm64
        - os: ubuntu-latest
          rid: linux-x64
        - os: ubuntu-latest
          rid: linux-arm64
        - os: macos-15-intel
          rid: osx-x64
        - os: macos-14
          rid: osx-arm64

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore ZScape.csproj -r ${{ matrix.rid }}

    - name: Build
      if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
      run: dotnet build ZScape.csproj --configuration Release -r ${{ matrix.rid }} --no-restore

    - name: Build release
      if: startsWith(github.ref, 'refs/tags/v')
      run: dotnet build ZScape.csproj --configuration Release -r ${{ matrix.rid }} --no-restore -p:VersionSuffix=

    - name: Publish
      if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
      run: dotnet publish ZScape.csproj -c Release -r ${{ matrix.rid }} --self-contained false --no-build -o ./publish/${{ matrix.rid }}

    - name: Publish release
      if: startsWith(github.ref, 'refs/tags/v')
      run: dotnet publish ZScape.csproj -c Release -r ${{ matrix.rid }} --self-contained false --no-build -o ./publish/${{ matrix.rid }} -p:VersionSuffix=

    - name: Prepare macOS app bundle
      if: runner.os == 'macOS'
      run: |
        VERSION_PREFIX=$(sed -n 's:.*<VersionPrefix>\(.*\)</VersionPrefix>.*:\1:p' ZScape.csproj | head -n 1)
        VERSION=${GITHUB_REF_NAME#v}
        if [ -z "$VERSION" ] || [ "$VERSION" = "$GITHUB_REF_NAME" ]; then
          VERSION="$VERSION_PREFIX"
        fi
        mkdir -p ./package/${{ matrix.rid }}/ZScape.app/Contents/MacOS
        mkdir -p ./package/${{ matrix.rid }}/ZScape.app/Contents/Resources
        cp -R ./publish/${{ matrix.rid }}/. ./package/${{ matrix.rid }}/ZScape.app/Contents/MacOS/
        cp ./packaging/assets/ZScape.icns ./package/${{ matrix.rid }}/ZScape.app/Contents/Resources/ZScape.icns
        cp ./packaging/assets/ZScape.png ./package/${{ matrix.rid }}/ZScape.app/Contents/Resources/ZScape.png
        cp ./packaging/icons/zscape-network-z-arcade-industrial.svg ./package/${{ matrix.rid }}/ZScape.app/Contents/Resources/ZScape.svg
        sed "s/__VERSION__/$VERSION/g" ./packaging/macos/Info.plist > ./package/${{ matrix.rid }}/ZScape.app/Contents/Info.plist
        chmod +x ./package/${{ matrix.rid }}/ZScape.app/Contents/MacOS/ZScape

    - name: Add Windows icon source
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        Copy-Item ./packaging/assets/ZScape.ico ./publish/${{ matrix.rid }}/ZScape.ico -Force
        Copy-Item ./packaging/assets/ZScape.png ./publish/${{ matrix.rid }}/ZScape.png -Force
        Copy-Item ./packaging/icons/zscape-network-z-arcade-industrial.svg ./publish/${{ matrix.rid }}/ZScape.svg -Force

    - name: Add Linux desktop entry and icon source
      if: runner.os == 'Linux'
      run: |
        cp ./packaging/linux/ZScape.desktop ./publish/${{ matrix.rid }}/ZScape.desktop
        cp ./packaging/assets/ZScape.png ./publish/${{ matrix.rid }}/ZScape.png
        cp ./packaging/icons/zscape-network-z-arcade-industrial.svg ./publish/${{ matrix.rid }}/ZScape.svg

    - name: Upload build artifact (Windows/Linux)
      if: runner.os != 'macOS'
      uses: actions/upload-artifact@v4
      with:
        name: ZScape-${{ matrix.rid }}
        path: ./publish/${{ matrix.rid }}/

    - name: Upload build artifact (macOS)
      if: runner.os == 'macOS'
      uses: actions/upload-artifact@v4
      with:
        name: ZScape-${{ matrix.rid }}
        path: ./package/${{ matrix.rid }}/

    - name: Zip release (Windows)
      if: startsWith(github.ref, 'refs/tags/v') && runner.os == 'Windows'
      shell: pwsh
      run: Compress-Archive -Path ./publish/${{ matrix.rid }}/* -DestinationPath ./ZScape-${{ github.ref_name }}-${{ matrix.rid }}.zip -Force

    - name: Tar release (Linux)
      if: startsWith(github.ref, 'refs/tags/v') && runner.os == 'Linux'
      working-directory: ./publish/${{ matrix.rid }}
      run: tar -czf "$GITHUB_WORKSPACE/ZScape-${{ github.ref_name }}-${{ matrix.rid }}.tar.gz" .

    - name: Tar release (macOS)
      if: startsWith(github.ref, 'refs/tags/v') && runner.os == 'macOS'
      working-directory: ./package/${{ matrix.rid }}
      run: tar -czf "$GITHUB_WORKSPACE/ZScape-${{ github.ref_name }}-${{ matrix.rid }}.tar.gz" ZScape.app

    - name: Upload release archive
      if: startsWith(github.ref, 'refs/tags/v')
      uses: actions/upload-artifact@v4
      with:
        name: release-${{ matrix.rid }}
        path: ./ZScape-${{ github.ref_name }}-${{ matrix.rid }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - name: Download release archives
      uses: actions/download-artifact@v4
      with:
        pattern: release-*
        path: ./release-assets
        merge-multiple: true

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: ./release-assets/*
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
