name: Build and Release

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
        - os: windows-latest
          rid: win-x64
        - os: ubuntu-latest
          rid: linux-x64
        - os: macos-13
          rid: osx-x64

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore ZScape.csproj -r ${{ matrix.rid }}

    - name: Build
      if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
      run: dotnet build ZScape.csproj --configuration Release -r ${{ matrix.rid }} --no-restore

    - name: Build release
      if: startsWith(github.ref, 'refs/tags/v')
      run: dotnet build ZScape.csproj --configuration Release -r ${{ matrix.rid }} --no-restore -p:VersionSuffix=

    - name: Publish
      if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
      run: dotnet publish ZScape.csproj -c Release -r ${{ matrix.rid }} --self-contained false --no-build -o ./publish/${{ matrix.rid }}

    - name: Publish release
      if: startsWith(github.ref, 'refs/tags/v')
      run: dotnet publish ZScape.csproj -c Release -r ${{ matrix.rid }} --self-contained false --no-build -o ./publish/${{ matrix.rid }} -p:VersionSuffix=

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: ZScape-${{ matrix.rid }}
        path: ./publish/${{ matrix.rid }}/

    - name: Zip release (Windows)
      if: startsWith(github.ref, 'refs/tags/v') && runner.os == 'Windows'
      shell: pwsh
      run: Compress-Archive -Path ./publish/${{ matrix.rid }}/* -DestinationPath ./ZScape-${{ github.ref_name }}-${{ matrix.rid }}.zip -Force

    - name: Zip release (Unix)
      if: startsWith(github.ref, 'refs/tags/v') && runner.os != 'Windows'
      working-directory: ./publish/${{ matrix.rid }}
      run: zip -r "$GITHUB_WORKSPACE/ZScape-${{ github.ref_name }}-${{ matrix.rid }}.zip" .

    - name: Upload release archive
      if: startsWith(github.ref, 'refs/tags/v')
      uses: actions/upload-artifact@v4
      with:
        name: release-${{ matrix.rid }}
        path: ./ZScape-${{ github.ref_name }}-${{ matrix.rid }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - name: Download release archives
      uses: actions/download-artifact@v4
      with:
        pattern: release-*
        path: ./release-assets
        merge-multiple: true

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: ./release-assets/*.zip
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
